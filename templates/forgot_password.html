<!doctype html>
<html>
<head><meta charset="utf-8"><title>Forgot Password</title></head>
<body style="font-family:system-ui; padding:24px;">
  <h1>Forgot password</h1>
  {% if msg %}<p style="color:green">{{ msg }}</p>{% endif %}
  <form method="POST">
    <label>Email</label><br>
    <input name="email" type="email" required style="padding:10px; width:320px;"><br><br>
    <button type="submit" style="padding:10px 14px;">Send reset link</button>
  </form>
  <p><a href="/login">Back to login</a></p>
</body>
</html>
