<!doctype html>
<html>
<head><meta charset="utf-8"><title>Reset Password</title></head>
<body style="font-family:system-ui; padding:24px;">
  <h1>Reset password</h1>
  {% if error %}<p style="color:red">{{ error }}</p>{% endif %}
  <p>Email: <b>{{ email }}</b></p>

  <form method="POST">
    <input type="hidden" name="token" value="{{ token }}">
    <label>New password</label><br>
    <input name="password" type="password" required style="padding:10px; width:320px;"><br><br>
    <label>Confirm new password</label><br>
    <input name="password2" type="password" required style="padding:10px; width:320px;"><br><br>
    <button type="submit" style="padding:10px 14px;">Update password</button>
  </form>
</body>
</html>
